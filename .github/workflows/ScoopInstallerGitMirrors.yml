name: Git Sync (All Mirrors)

# 新增权限：允许删除 Actions 记录
permissions:
  actions: write
  contents: read

on: 
  watch:
    types: [started]
  schedule:
  - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  prepare-matrix:
    name: Prepare Shared Config
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.set-matrix.outputs.repos }}
    steps:
      - id: set-matrix
        run: |
          echo 'repos=[
            { "name": "Scoop", "org": "ScoopInstaller" },
            { "name": "Main", "org": "ScoopInstaller" },
            { "name": "Extras", "org": "ScoopInstaller" },
            { "name": "Versions", "org": "ScoopInstaller" },
            { "name": "Nirsoft", "org": "ScoopInstaller" },
            { "name": "PHP", "org": "ScoopInstaller" },
            { "name": "Nonportable", "org": "ScoopInstaller" },
            { "name": "Java", "org": "ScoopInstaller" },
            { "name": "Tests", "org": "ScoopInstaller" },
            { "name": "scoop-games", "org": "Calinou", "dest_name": "Games" },
            { "name": "scoop-sysinternals", "org": "niheaven", "dest_name": "Sysinternals" },
            { "name": "scoop-nerd-fonts", "org": "matthewjberger", "dest_name": "Nerd-fonts" },
            { "name": "android_build", "org": "omnirom", "dest_org": "huiaei" },
            { "name": "android_art", "org": "omnirom", "dest_org": "huiaei" },
            { "name": "android_bionic", "org": "omnirom", "dest_org": "huiaei" },
            { "name": "OpenCore-Install-Guide", "org": "dortania", "dest_org": "huiaei" }
          ]' >> $GITHUB_OUTPUT

  sync-ssh:
    name: Sync to Gitee
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare-matrix.outputs.repos) }}
    steps:
      - name: Sync ${{ matrix.repo.org }}/${{ matrix.repo.name }} to Gitee
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
        with:
          source-repo: "git@github.com:${{ matrix.repo.org }}/${{ matrix.repo.name }}.git"
          destination-repo: "git@gitee.com:${{ matrix.repo.dest_org || 'ScoopInstaller_Mirrors' }}/${{ matrix.repo.dest_name || matrix.repo.name }}.git"

  sync-cnb:
    name: Sync to CNB
    runs-on: ubuntu-latest
    needs: prepare-matrix
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.prepare-matrix.outputs.repos) }}
    steps:
      - name: Sync ${{ matrix.repo.org }}/${{ matrix.repo.name }} to CNB
        if: ${{ matrix.repo.dest_org == null }}
        env:
          CNB_USER: ${{ secrets.CNB_USERNAME }}
          CNB_TOKEN: ${{ secrets.CNB_ACCESS_TOKEN }}
        run: |
          set -e
          if [ -z "$CNB_USER" ] || [ -z "$CNB_TOKEN" ]; then
            echo "::error::CNB config missing"
            exit 1
          fi
          git clone --mirror "https://github.com/${{ matrix.repo.org }}/${{ matrix.repo.name }}.git" repo.git
          docker run --rm -v "$(pwd)/repo.git":/git -w /git \
            -e PLUGIN_TARGET_URL="https://cnb.cool/ScoopInstaller_Mirrors/${{ matrix.repo.dest_name || matrix.repo.name }}.git" \
            -e PLUGIN_AUTH_TYPE="https" \
            -e PLUGIN_USERNAME="$CNB_USER" \
            -e PLUGIN_PASSWORD="$CNB_TOKEN" \
            -e PLUGIN_FORCE="true" \
            -e PLUGIN_PUSH_TAGS="true" \
            tencentcom/git-sync

  # 新增：自动清理 7 天前的执行记录
  cleanup-runs:
    name: Cleanup Old Actions Runs
    runs-on: ubuntu-latest
    needs: [sync-ssh, sync-cnb]
    if: always()
    steps:
      - name: Delete runs older than 7 days
        uses: Matt-Gleich/delete-old-workflow-runs@v2
        with:
          days-old: 7
          workflow-name: Git Sync (All Mirrors)
